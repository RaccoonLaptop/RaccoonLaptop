name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: RaccoonLaptop
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - run: |
          mkdir -p output
          cp dist/github-contribution-grid-snake-dark.svg output/github-contribution-grid-snake.svg

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake"
          file_pattern: output/github-contribution-grid-snake.svg
